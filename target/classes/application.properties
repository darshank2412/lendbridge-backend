server.port=8081
spring.application.name=lendbridge-backend
spring.datasource.url=jdbc:postgresql://localhost:5432/mlp_internship
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
jwt.secret=LendBridge@Secret#2025SecureKeyForJWTSigningPlatform
jwt.expiration-ms=86400000
twilio.account-sid=ACXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
twilio.auth-token=your_auth_token
twilio.phone-number=+15551234567
twilio.enabled=false
otp.expiry-minutes=10
otp.length=6
spring.task.scheduling.pool.size=5
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
